<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAIRA AGI - Responsive Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        
        :root { --neon: #22d3ee; }
        body { background-color: #020617; color: var(--neon); font-family: 'Rajdhani', sans-serif; height: 100vh; height: -webkit-fill-available; margin: 0; display: flex; flex-direction: column; }
        html { height: -webkit-fill-available; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(34, 211, 238, 0.15); }
        
        /* Scanner Effect */
        .scanner-line { height: 2px; background: linear-gradient(to right, transparent, var(--neon), transparent); position: absolute; width: 100%; animation: scan 4s linear infinite; opacity: 0.5; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .mic-active { box-shadow: 0 0 20px #ef4444 !important; border-color: #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        #chat-hub::-webkit-scrollbar { width: 2px; }
        #chat-hub::-webkit-scrollbar-thumb { background: var(--neon); }
        
        canvas { width: 100% !important; height: 40px !important; }
    </style>
</head>
<body class="p-2 md:p-4 gap-3">

    <header class="flex justify-between items-center px-3 py-2 glass-panel rounded-xl shrink-0">
        <div class="flex items-center gap-3">
            <div class="relative w-10 h-10 flex items-center justify-center shrink-0">
                <div class="absolute inset-0 border border-cyan-500 rounded-full animate-spin"></div>
                <span class="orbitron text-[10px] font-bold">SA</span>
            </div>
            <div class="min-w-0">
                <h1 class="text-sm md:text-xl orbitron font-bold tracking-tighter truncate">SAIRA <span class="text-[8px] md:text-[10px] text-cyan-600">V17.5</span></h1>
                <p class="text-[8px] md:text-[10px] uppercase opacity-60 truncate">Neural Link: Active</p>
            </div>
        </div>
        <div class="text-right orbitron shrink-0">
            <div id="clock" class="text-xs md:text-lg font-bold">00:00:00</div>
            <div class="text-[7px] md:text-[9px] text-green-500 animate-pulse uppercase">Secure</div>
        </div>
    </header>

    <main class="flex-1 flex flex-col lg:grid lg:grid-cols-4 gap-3 overflow-hidden">
        
        <aside class="flex flex-row lg:flex-col gap-3 shrink-0">
            <div class="glass-panel p-3 rounded-xl relative overflow-hidden flex-1 lg:flex-none lg:h-64">
                <div class="scanner-line"></div>
                <h3 class="orbitron text-[9px] mb-2 text-cyan-500 border-b border-cyan-900 pb-1">SYSTEM HEALTH</h3>
                <div class="space-y-3">
                    <div>
                        <div class="flex justify-between text-[8px] mb-1"><span>LOAD</span><span id="load-pct">5%</span></div>
                        <div class="h-1 bg-cyan-950 rounded-full overflow-hidden"><div id="load-bar" class="h-full bg-cyan-500 transition-all duration-700" style="width: 5%"></div></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="bg-cyan-950/30 p-1.5 rounded border border-cyan-900/30 text-[9px]">
                            <p class="opacity-50">TEMP</p>
                            <p id="temp-stat" class="font-bold">36°C</p>
                        </div>
                        <div class="bg-cyan-950/30 p-1.5 rounded border border-cyan-900/30 text-[9px]">
                            <p class="opacity-50">BRIDGE</p>
                            <p id="bridge-stat" class="font-bold text-red-500">WAITING</p>
                        </div>
                    </div>
                    <canvas id="neuralWave" class="hidden md:block"></canvas>
                </div>
            </div>
            
            <div class="glass-panel p-3 rounded-xl flex flex-col justify-center items-center lg:items-start flex-1 lg:flex-none">
                <h3 class="orbitron text-[9px] text-cyan-500 uppercase">Memory</h3>
                <div class="flex items-baseline gap-1">
                    <span class="text-xl font-bold text-white leading-none">1024</span>
                    <span class="text-[7px] opacity-40">NODES</span>
                </div>
            </div>
        </aside>

        <section class="flex-1 lg:col-span-3 flex flex-col gap-3 overflow-hidden min-h-0">
            <div id="chat-hub" class="glass-panel flex-1 rounded-xl p-3 overflow-y-auto flex flex-col gap-3">
                <div class="flex gap-2">
                    <div class="w-8 h-8 rounded bg-cyan-900/50 flex items-center justify-center border border-cyan-500/30 shrink-0">
                        <span class="text-[10px] font-bold">SR</span>
                    </div>
                    <div class="max-w-[85%] bg-cyan-950/40 p-2.5 rounded-r-lg rounded-bl-lg border border-cyan-900/20 text-xs text-cyan-100">
                        प्रणाम मास्टर उज्ज्वल। सायरा ऑनलाइन है।
                    </div>
                </div>
            </div>

            <div class="glass-panel p-1.5 rounded-xl flex gap-2 items-center shrink-0">
                <button id="mic-trigger" onclick="toggleListening()" class="w-10 h-10 flex items-center justify-center rounded-lg border border-cyan-500/20 active:scale-95 transition-all">
                    <span id="mic-icon">🎤</span>
                </button>
                
                <input type="text" id="query-input" 
                    class="flex-1 bg-transparent border-none outline-none px-2 py-2 text-sm text-white placeholder:text-cyan-900" 
                    placeholder="लिखिए मास्टर...">
                
                <button onclick="executeCommand()" 
                    class="bg-cyan-600 text-black orbitron font-bold text-[10px] px-4 h-10 rounded-lg active:scale-95 transition-all">
                    SEND
                </button>
            </div>
        </section>
    </main>

    <script>
        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
            document.getElementById('temp-stat').innerText = (36 + Math.random()).toFixed(1) + "°C";
        }, 1000);
        // Neural Waveform Logic
        const canvas = document.getElementById('neuralWave');
        const ctx = canvas.getContext('2d');
        let offset = 0; let waveSpeed = 0.05;
        function resize() { canvas.width = canvas.offsetWidth; canvas.height = 40; }
        window.addEventListener('resize', resize); resize();
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.beginPath(); ctx.strokeStyle = '#22d3ee'; ctx.lineWidth = 1;
            for(let x=0; x<canvas.width; x++) {
                const amp = waveSpeed > 0.1 ? 12 : 6;
                const y = 20 + Math.sin(x*0.05 + offset) * amp;
                x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
            }
            ctx.stroke(); offset += waveSpeed; requestAnimationFrame(draw);
        }
        draw();
        // Voice & Speech
        let isListening = false;
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        const rec = Speech ? new Speech() : null;
        if(rec) {
            rec.lang = 'hi-IN'; rec.continuous = false;
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('query-input').value = text;
                toggleListening(); executeCommand();
            };
        }
        function toggleListening() {
            if(!rec) return alert("Speech not supported");
            isListening ? rec.stop() : rec.start();
            isListening = !isListening;
            document.getElementById('mic-trigger').classList.toggle('mic-active');
            document.getElementById('mic-icon').innerText = isListening ? '🛑' : '🎤';
        }
        function SairaSpeak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN';
            synth.speak(utter);
        }
        // Bridge Execution
        async function executeCommand() {
            const input = document.getElementById('query-input');
            const chat = document.getElementById('chat-hub');
            const q = input.value.trim();
            if(!q) return;
            // UI Feedback
            document.getElementById('bridge-stat').innerText = "LINKING";
            document.getElementById('bridge-stat').style.color = "#fbbf24";
            document.getElementById('load-bar').style.width = "95%";
            
            chat.innerHTML += `<div class="flex justify-end mb-2"><div class="bg-white/5 p-2 rounded-lg border border-white/10 text-xs max-w-[85%]">${q}</div></div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;
            waveSpeed = 0.8;
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({query: q})
                });
                const data = await res.json();
                
                document.getElementById('bridge-stat').innerText = "ACTIVE";
                document.getElementById('bridge-stat').style.color = "#22d3ee";
                document.getElementById('load-bar').style.width = "10%";
                chat.innerHTML += `<div class="flex gap-2 mb-2"><div class="w-8 h-8 rounded bg-cyan-900/50 flex items-center justify-center border border-cyan-500/30 shrink-0"><span class="text-[10px]">SR</span></div><div class="bg-cyan-950/40 p-2.5 rounded-lg border border-cyan-900/20 text-xs text-cyan-100 max-w-[85%]">${data.reply}</div></div>`;
                SairaSpeak(data.reply);
            } catch (e) {
                document.getElementById('bridge-stat').innerText = "ERROR";
                document.getElementById('bridge-stat').style.color = "#ef4444";
            }
            
            waveSpeed = 0.05;
            chat.scrollTop = chat.scrollHeight;
        }
        document.getElementById('query-input').addEventListener('keypress', (e) => e.key === 'Enter' && executeCommand());
    </script>
</body>
</html>
